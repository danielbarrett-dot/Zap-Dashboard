databases:
  - name: zap-electrical-db
    databaseName: zap_dashboard
    plan: basic-256mb

services:
  - type: web
    name: zap-electrical-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build --workspace apps/api
    startCommand: cd apps/api && npx prisma migrate deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ENABLE_API_SCHEDULER
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: zap-electrical-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: COOKIE_DOMAIN
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: SERVICEM8_SYNC_MODE
        value: MOCK
      - key: SERVICEM8_API_BASE_URL
        value: https://api.servicem8.com/api_1.0
      - key: SERVICEM8_API_KEY
        sync: false
      - key: SERVICEM8_ACCESS_TOKEN
        sync: false
      - key: SERVICEM8_MATERIALS_FIELD
        value: customfield_materials_cost
      - key: SERVICEM8_LEAD_SOURCE_FIELD
        value: customfield_lead_source
      - key: SERVICEM8_JOB_TYPE_FIELD
        value: customfield_job_type
      - key: SERVICEM8_SUBCONTRACTOR_FIELD
        value: customfield_subcontractor_cost
      - key: SERVICEM8_ESTIMATED_HOURS_FIELD
        value: customfield_estimated_hours
      - key: SERVICEM8_ESTIMATED_MATERIALS_FIELD
        value: customfield_estimated_materials
      - key: QUICKBOOKS_SYNC_MODE
        value: MOCK
      - key: QUICKBOOKS_API_BASE_URL
        value: https://quickbooks.api.intuit.com
      - key: QUICKBOOKS_TOKEN_URL
        value: https://oauth.platform.intuit.com/oauth2/v1/tokens/bearer
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_REALM_ID
        sync: false
      - key: QUICKBOOKS_REFRESH_TOKEN
        sync: false
      - key: SUPPLIER_INVOICE_INBOX_MODE
        value: MOCK
      - key: SUPPLIER_INVOICE_INBOX_ADDRESS
        value: invoices@zap-dashboard.co.uk
      - key: SUPPLIER_INVOICE_CONFIDENCE_THRESHOLD
        value: "0.85"
      - key: SERVICEM8_SYNC_CRON
        value: "*/20 * * * *"
      - key: QUICKBOOKS_SYNC_CRON
        value: "0 */2 * * *"
      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: "10"
      - key: PIPELINE_QUOTED_STATUSES
        value: Quote,Quoted,Estimate Sent
      - key: PIPELINE_ACCEPTED_STATUSES
        value: Accepted,Approved,Work Order
      - key: PIPELINE_COMPLETED_STATUSES
        value: Completed,Job Done,Invoiced
      - key: PIPELINE_CANCELLED_STATUSES
        value: Cancelled,Unsuccessful

  - type: web
    name: zap-electrical-web
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace apps/web
    startCommand: cd apps/web && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://zap-dashboard-api.onrender.com/api

  - type: worker
    name: zap-electrical-sync-worker
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build --workspace apps/api
    startCommand: cd apps/api && npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: zap-electrical-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: COOKIE_DOMAIN
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: SERVICEM8_SYNC_MODE
        value: MOCK
      - key: SERVICEM8_API_BASE_URL
        value: https://api.servicem8.com/api_1.0
      - key: SERVICEM8_API_KEY
        sync: false
      - key: SERVICEM8_ACCESS_TOKEN
        sync: false
      - key: SERVICEM8_MATERIALS_FIELD
        value: customfield_materials_cost
      - key: SERVICEM8_LEAD_SOURCE_FIELD
        value: customfield_lead_source
      - key: SERVICEM8_JOB_TYPE_FIELD
        value: customfield_job_type
      - key: SERVICEM8_SUBCONTRACTOR_FIELD
        value: customfield_subcontractor_cost
      - key: SERVICEM8_ESTIMATED_HOURS_FIELD
        value: customfield_estimated_hours
      - key: SERVICEM8_ESTIMATED_MATERIALS_FIELD
        value: customfield_estimated_materials
      - key: QUICKBOOKS_SYNC_MODE
        value: MOCK
      - key: QUICKBOOKS_API_BASE_URL
        value: https://quickbooks.api.intuit.com
      - key: QUICKBOOKS_TOKEN_URL
        value: https://oauth.platform.intuit.com/oauth2/v1/tokens/bearer
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_REALM_ID
        sync: false
      - key: QUICKBOOKS_REFRESH_TOKEN
        sync: false
      - key: SUPPLIER_INVOICE_INBOX_MODE
        value: MOCK
      - key: SUPPLIER_INVOICE_INBOX_ADDRESS
        value: invoices@zap-dashboard.co.uk
      - key: SUPPLIER_INVOICE_CONFIDENCE_THRESHOLD
        value: "0.85"
      - key: SERVICEM8_SYNC_CRON
        value: "*/20 * * * *"
      - key: QUICKBOOKS_SYNC_CRON
        value: "0 */2 * * *"
      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: "10"
      - key: PIPELINE_QUOTED_STATUSES
        value: Quote,Quoted,Estimate Sent
      - key: PIPELINE_ACCEPTED_STATUSES
        value: Accepted,Approved,Work Order
      - key: PIPELINE_COMPLETED_STATUSES
        value: Completed,Job Done,Invoiced
      - key: PIPELINE_CANCELLED_STATUSES
        value: Cancelled,Unsuccessful
